name: "CD: Deploy Documentation"

# Publishes the Astro + Starlight bot-developer docs (docs/) to GitHub Pages.
# Paths-filtered to docs/** so backend pushes never trigger a docs deploy and vice versa;
# the backend CI (ci.yaml) likewise ignores docs-only changes.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yaml'
  workflow_dispatch:

# One concurrent Pages deployment; a newer push supersedes an in-flight one.
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  BUILD_PATH: "./docs"

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "${{ env.BUILD_PATH }}/package-lock.json"

      - name: Install Node Dependencies
        run: npm ci
        working-directory: ${{ env.BUILD_PATH }}

      - name: Build with Astro
        run: npm run build
        working-directory: ${{ env.BUILD_PATH }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ env.BUILD_PATH }}/dist"

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
