name: 'CI: Gemini Review'

# Automated PR review via the official run-gemini-cli action (replaces the
# consumer Gemini Code Assist GitHub app, sunset 2026-07-17).
# - Reviews every non-fork PR on open; re-review on demand with a
#   "@gemini-cli /review" comment from the owner or collaborators.
# - Auth: GEMINI_API_KEY repo secret (AI Studio). Model: GEMINI_MODEL repo
#   variable — flip it without commits. Debug: set repo variable
#   GEMINI_DEBUG=true to stream CLI logs and upload stdout/stderr artifacts.
# - The review follows repo conventions: the CLI loads AGENTS.md via the
#   context.fileName setting below.
# - The review prompt drives the GitHub MCP server v0.27.0 tools directly
#   (the gemini-cli-extensions/code-review extension referenced stale tool
#   names and is deliberately NOT used).

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

jobs:
  review:
    # Fork PRs are excluded (no secrets there); comment-trigger is restricted
    # to owner/members/collaborators to keep untrusted users from spending quota.
    if: |-
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
       startsWith(github.event.comment.body, '@gemini-cli /review'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Gemini pull request review
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GITHUB_TOKEN: ${{ github.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ vars.GEMINI_MODEL }}
          gemini_debug: ${{ fromJSON(vars.GEMINI_DEBUG || false) }}
          upload_artifacts: ${{ vars.GEMINI_DEBUG || 'false' }}
          workflow_name: gemini-review
          github_pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
          # NOTE: this settings block is written to .gemini/settings.json for the
          # run and REPLACES the committed one — keep context.fileName in sync
          # with the repo convention (AGENTS.md is canonical).
          settings: |-
            {
              "context": {
                "fileName": ["AGENTS.md", "GEMINI.md"]
              },
              "model": {
                "maxSessionTurns": 25
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "pull_request_read",
                    "pull_request_review_write",
                    "add_comment_to_pending_review"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          prompt: |-
            You are reviewing a GitHub pull request.

            Repository: ${{ github.repository }}
            Pull request number: ${{ github.event.pull_request.number || github.event.issue.number }}

            Your review criteria are this repository's conventions, already loaded
            into your context from AGENTS.md: apply its code conventions, testing
            conventions, gotchas, and security boundaries. Report only findings a
            maintainer would act on: real bugs, contract or invariant violations,
            security issues, missing tests for new behaviour, and documented-gotcha
            violations. Do not comment on formatting the toolchain enforces, do not
            restate the diff, and do not praise.

            Follow EXACTLY this tool sequence (GitHub MCP server tools):
            1. pull_request_read with method "get" — read the PR title and description.
            2. pull_request_read with method "get_diff" — get the full diff.
            3. Analyse the diff against the review criteria above.
            4. pull_request_review_write with method "create" — open a pending review.
            5. For EACH finding: add_comment_to_pending_review with:
               - path: the file path from the diff
               - line: the line number in the NEW file version; side "RIGHT"
                 (use the OLD version line and side "LEFT" only for pure deletions)
               - subjectType: "LINE"
               - body: "[HIGH|MEDIUM|LOW] <concise finding>. <why it matters / what
                 to do>" — add a fenced ```suggestion block only when you are
                 certain of the exact replacement lines.
            6. pull_request_review_write with method "submit_pending" with
               event "COMMENT" (NEVER "APPROVE" or "REQUEST_CHANGES") and a body
               containing a 2-4 sentence summary: overall verdict, main risks,
               anything you could not verify. Submit this review even when you
               have zero findings — then the summary is a short LGTM note.

            Hard rules: never attempt shell commands or file edits; if a tool call
            fails, retry once, then submit the pending review with what you have,
            stating the failure in the summary. Write everything in English.
