# Pinned project name so the stack is stable regardless of the deploy directory.
name: dicechess-play-api

services:
  api:
    # Tag is overridable so one compose file serves every environment: prod pins a
    # released version (API_TAG=vX.Y.Z), unset defaults to :latest for dev/local.
    image: ghcr.io/rabestro/dicechess-play-api:${API_TAG:-latest}
    restart: always
    env_file:
      - .env
    environment:
      # Bot roster for the Bot API (single-author gate): comma-separated team|name|token.
      PLAY_BOT_TOKENS: ${PLAY_BOT_TOKENS:-}
      # Browser CORS allow-list (comma-separated full origins); empty = allow any origin.
      PLAY_CORS_ORIGINS: ${PLAY_CORS_ORIGINS:-}
      # Catalog roster (ADR-0014): ;-separated `team|name|description` entries opened to human games at startup —
      # the admin path for bots that can't self-flag via POST /bot/open-to-humans (a lost token).
      PLAY_OPEN_TO_HUMANS: ${PLAY_OPEN_TO_HUMANS:-}
      JAVA_OPTS: "-Dcats.effect.warnOnNonMainThreadDetected=false --sun-misc-unsafe-memory-access=allow"
    # Host port 8040 (analytics owns 8020/8030 on aurora). The tunnel reaches the api over the
    # compose network at api:8080, so this mapping is only for local curl / debugging.
    ports:
      - "8040:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cloudflare Tunnel: publishes the api at play-api.jc.id.lv with automatic TLS + WSS and no
  # port-forwarding. The public hostname (play-api.jc.id.lv -> HTTP -> api:8080) is configured in the
  # Cloudflare dashboard; the token (account-scoped, keep it in .env, never commit) wires this side.
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN:-}
    depends_on:
      - api
